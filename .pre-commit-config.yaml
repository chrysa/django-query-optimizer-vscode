---
repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v6.0.0
      hooks:
          - id: trailing-whitespace
          - id: end-of-file-fixer
          - id: check-yaml
          - id: check-json
          - id: check-toml
          - id: check-added-large-files
            args: [--maxkb=1024]
          - id: check-merge-conflict
          - id: check-case-conflict
          - id: mixed-line-ending
          - id: detect-private-key

    - repo: https://github.com/Yelp/detect-secrets
      rev: v1.5.0
      hooks:
          - id: detect-secrets
            args: [--baseline, .secrets.baseline]
            exclude: package.lock.json|yarn.lock|pnpm-lock.yaml

    - repo: https://github.com/compilerla/conventional-pre-commit
      rev: v4.4.0
      hooks:
          - id: conventional-pre-commit
            stages: [commit-msg]
            args: [--strict, --force-scope, feat, fix, chore, docs, refactor, test, ci, build, perf]

    - repo: https://github.com/adrienverge/yamllint
      rev: v1.35.1
      hooks:
          - id: yamllint
            args: [-d, '{extends: default, rules: {line-length: disable, document-start: disable}}']

    - repo: https://github.com/rhysd/actionlint
      rev: v1.7.7
      hooks:
          - id: actionlint
            files: ^\.github/workflows/.*\.ya?ml$

    - repo: https://github.com/chrysa/pre-commit-tools
      rev: v0.1.1-76
      hooks:
          - id: adr-gate
          - id: console-log-detection
          - id: console-debug-detection
          - id: no-console-warn
          - id: ts-unreachable-code
          - id: regression-gate
            stages: [pre-push]
