---
# Semantic release workflow template (chrysa ecosystem)
# Uses: GitVersion + cliff (git-cliff) for changelog generation
#
# Usage: copy to .github/workflows/release.yml and adapt.
# ⚠️ This file lives in workflows/ (NOT .github/workflows/) — it cannot be
#    called via `uses: chrysa/shared-standards/...`. Copy it to your repo.
#
# Required secrets: GITHUB_TOKEN (automatic), RELEASE_TOKEN (for protected branches)
#
# Expects:
#   - GitVersion.yml at repo root
#   - cliff.toml at repo root (or pass changelog-config input)

name: Release

on:
    workflow_call:
        inputs:
            changelog-config:
                description: Path to cliff.toml
                required: false
                type: string
                default: cliff.toml
            tag-prefix:
                description: Version tag prefix (e.g. v)
                required: false
                type: string
                default: v
            create-github-release:
                description: Create a GitHub Release with the generated changelog
                required: false
                type: boolean
                default: true
        secrets:
            RELEASE_TOKEN:
                required: false

    push:
        branches:
            - main
            - master
        paths-ignore:
            - '**.md'
            - '.github/**'

permissions:
    contents: write
    pull-requests: read

jobs:
    release:
        runs-on: ubuntu-latest
        name: Semantic Release

        steps:
            - uses: actions/checkout@v7.0.0
              with:
                  fetch-depth: 0
                  token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

            - name: Install GitVersion
              uses: gittools/actions/gitversion/setup@v4.5.0
              with:
                  versionSpec: '6.x'

            - name: Determine version
              id: gitversion
              uses: gittools/actions/gitversion/execute@v4.5.0

            - name: Install git-cliff
              uses: taiki-e/install-action@git-cliff

            - name: Generate changelog
              id: changelog
              env:
                  TAG_PREFIX: ${{ inputs.tag-prefix }}
                  SEMVER: ${{ steps.gitversion.outputs.semVer }}
              run: |
                  CURRENT_TAG="${TAG_PREFIX}${SEMVER}"
                  git cliff --output CHANGELOG_RELEASE.md --tag "$CURRENT_TAG" 2>/dev/null || \
                    git cliff --unreleased --output CHANGELOG_RELEASE.md
                  echo "version=$CURRENT_TAG" >> "$GITHUB_OUTPUT"

            - name: Create tag
              run: |
                  git config user.name 'chrysa'
                  git config user.email 'greau.anthony@gmail.com'
                  git tag "${{ steps.changelog.outputs.version }}" || echo "Tag already exists"
                  git push origin "${{ steps.changelog.outputs.version }}" || echo "Tag push skipped"

            - name: Create GitHub Release
              if: ${{ inputs.create-github-release }}
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: ${{ steps.changelog.outputs.version }}
                  name: Release ${{ steps.changelog.outputs.version }}
                  body_path: CHANGELOG_RELEASE.md
                  token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
